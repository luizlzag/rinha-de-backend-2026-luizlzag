name: Build and Push Docker Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download references.json.gz
        run: |
          curl -fL "https://github.com/zanfranceschi/rinha-de-backend-2026/raw/main/resources/references.json.gz" \
            -o resources/references.json.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          platforms: linux/amd64
          push: true
          tags: luizlzag/rinha-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Vector image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.vector
          platforms: linux/amd64
          push: true
          tags: luizlzag/rinha-vector:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

services:
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api-1
      - api-2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "10MB"

  api-1:
    image: luizlzag/rinha-api:latest
    environment:
      PORT: "3000"
      VECTOR_SERVICE_URL: "http://vector-svc:4000"
      RESOURCES_DIR: "/app/resources"
    depends_on:
      vector-svc:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"

  api-2:
    image: luizlzag/rinha-api:latest
    environment:
      PORT: "3000"
      VECTOR_SERVICE_URL: "http://vector-svc:4000"
      RESOURCES_DIR: "/app/resources"
    depends_on:
      vector-svc:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "20MB"

  vector-svc:
    image: luizlzag/rinha-vector:latest
    environment:
      PORT: "4000"
      NPROBE: "10"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "0.55"
          memory: "300MB"

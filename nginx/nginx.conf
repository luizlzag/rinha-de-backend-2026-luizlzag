worker_processes 1;
events { worker_connections 1024; }

http {
    upstream api {
        server api-1:3000;
        server api-2:3000;
    }

    server {
        listen 9999;
        access_log off;

        location / {
            proxy_pass         http://api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }
    }
}
